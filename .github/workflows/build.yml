name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: build (.app bundle)
    runs-on: macos-15
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          swift --version
          xcrun --show-sdk-path
          sw_vers

      - name: Build
        run: ./build.sh

      - name: Verify bundle
        run: |
          BUNDLE=".build/Claude Token Monitor.app"
          test -d "$BUNDLE/Contents/MacOS"
          test -x "$BUNDLE/Contents/MacOS/ClaudeTokenMonitor"
          test -f "$BUNDLE/Contents/Info.plist"
          codesign --verify --strict --verbose=2 "$BUNDLE"
          plutil -lint "$BUNDLE/Contents/Info.plist"

      - name: Smoke test JSONL parser
        run: |
          mkdir -p /tmp/smoke/Sources
          cp Sources/Models.swift Sources/Pricing.swift Sources/UsageReader.swift /tmp/smoke/Sources/
          cat > /tmp/smoke/main.swift <<'EOF'
          import Foundation
          let r = UsageReader().generateReport()
          print("ok entries=\(r.totalEntries) tokens=\(r.allTime.totalTokens)")
          EOF
          swiftc -O -framework Foundation \
            /tmp/smoke/Sources/Models.swift \
            /tmp/smoke/Sources/Pricing.swift \
            /tmp/smoke/Sources/UsageReader.swift \
            /tmp/smoke/main.swift -o /tmp/smoke/cli
          /tmp/smoke/cli

      - name: Package zip
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd .build
          ditto -c -k --keepParent "Claude Token Monitor.app" "ClaudeTokenMonitor.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeTokenMonitor-app
          path: .build/Claude Token Monitor.app
          if-no-files-found: error
          retention-days: 14

  release:
    name: release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: ./build.sh
      - name: Create zip
        run: |
          cd .build
          ditto -c -k --keepParent "Claude Token Monitor.app" "ClaudeTokenMonitor.zip"
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: .build/ClaudeTokenMonitor.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
